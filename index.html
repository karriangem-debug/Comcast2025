<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comcast 2025 | Portal Pro Max</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="logo">COMCAST 2025</div>
        <ul id="main-nav">
            <li><a href="#" onclick="showSection('deadline-view')">Deadline</a></li>
            <li><a href="#" onclick="showSection('profile-view')">Galeri</a></li>
            <li id="nav-login"><a href="#" onclick="showSection('login-section')" class="btn-login-ui">Admin</a></li>
            <li id="nav-admin" style="display:none;"><a href="#" onclick="showSection('admin-dashboard')" class="btn-admin-ui">Panel Input</a></li>
            <li id="nav-logout" style="display:none;"><a href="#" onclick="logout()" class="btn-logout">Logout</a></li>
        </ul>
    </nav>

    <div id="sync-alert">✅ Data Berhasil Disinkronkan!</div>

    <!-- VIEW: DEADLINE -->
    <section id="deadline-view" class="active">
        <div class="tab-header">
            <button class="tab-btn" id="tab-old" onclick="filterDeadline('old')">⌛ Lalu</button>
            <button class="tab-btn active" id="tab-now" onclick="filterDeadline('now')">🔥 Minggu Ini</button>
            <button class="tab-btn" id="tab-next" onclick="filterDeadline('next')">📅 Besok</button>
        </div>
        <div id="week-display" class="week-row"></div>
    </section>

    <!-- VIEW: GALERI -->
    <section id="profile-view">
        <div id="admin-photo-input" style="display:none;" class="admin-card">
            <h4>Tambah Foto Baru</h4>
            <input type="text" id="new-photo-url" placeholder="Link Foto (Drive/Direct Link)">
            <input type="text" id="new-photo-caption" placeholder="Keterangan Foto">
            <button onclick="addPhoto()" style="background:#2ecc71;">Simpan Foto ke Galeri</button>
        </div>
        <div id="gallery-container" class="gallery-grid"></div>
    </section>

    <!-- VIEW: LOGIN -->
    <section id="login-section">
        <div class="login-box">
            <h3>Login Admin PDD</h3>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button onclick="login()">Masuk</button>
        </div>
    </section>

    <!-- VIEW: ADMIN DASHBOARD -->
    <section id="admin-dashboard">
        <div class="admin-card">
            <h3>Input Tugas Baru</h3>
            <input type="date" id="task-date">
            <input type="time" id="task-time">
            <textarea id="task-name" rows="3" placeholder="Nama Matkul & Detail Tugas..."></textarea>
            <button onclick="saveTask()">Simpan Tugas</button>
        </div>

        <div class="admin-card">
            <h3>Bagikan Update</h3>
            <button onclick="shareLink()" style="background:#25d366;">Bagikan via WA</button>
        </div>

        <h3>List Edit/Hapus Tugas</h3>
        <div id="admin-task-list"></div>
    </section>

    <!-- MODAL GELEMBUNG EDIT -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <h3 id="modal-title">Edit Data</h3>
            <div id="modal-inputs"></div>
            <div class="modal-buttons">
                <button onclick="saveEditModal()" style="background:#2ecc71;">Simpan</button>
                <button onclick="closeModal()" style="background:#95a5a6;">Batal</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
