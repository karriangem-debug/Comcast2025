<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COMCAST 2025 | Premium Portal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="light-theme">

    <!-- NAVBAR PREMIUM -->
    <nav class="glass-nav">
        <div class="nav-container">
            <button class="menu-trigger" onclick="toggleMenu()">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </button>
            <div class="logo-area">
                <h1 class="logo-main animate-glow">COMCAST<span>2025</span></h1>
            </div>
            <div class="nav-right">
                <div class="status-dot"></div>
            </div>
        </div>
    </nav>

    <!-- SIDEBAR MODERN -->
    <aside id="sidebar" class="modern-sidebar">
        <div class="sidebar-header">
            <span class="user-badge">STUDENT MODE</span>
        </div>
        
        <div class="menu-section">
            <p class="section-label">MAIN NAVIGATION</p>
            <a href="javascript:void(0)" class="menu-link" onclick="showSection('deadline-view')">
                <i class="icon">📅</i> Deadline Tugas
            </a>
            <a href="javascript:void(0)" class="menu-link" onclick="showSection('schedule-view')">
                <i class="icon">📚</i> Jadwal Kuliah
            </a>
            <a href="javascript:void(0)" class="menu-link" onclick="showSection('structure-view')">
                <i class="icon">👥</i> Struktur Kelas
            </a>
        </div>

        <div class="menu-section">
            <p class="section-label">CONNECTIVITY</p>
            <a href="javascript:void(0)" class="menu-link wa-btn" onclick="shareDataWA()">
                <i class="icon">📲</i> Share Web ke WA
            </a>
        </div>

        <div id="admin-group" style="display:none">
            <div class="menu-section">
                <p class="section-label">ADMINISTRATION</p>
                <a href="javascript:void(0)" class="menu-link" onclick="showSection('admin-panel')">
                    <i class="icon">⚙️</i> Manage Data
                </a>
                <a href="javascript:void(0)" class="menu-link logout" onclick="logout()">
                    <i class="icon">🚪</i> Logout
                </a>
            </div>
        </div>

        <a href="javascript:void(0)" id="login-trigger" class="menu-link login" onclick="showSection('login-page')">
            <i class="icon">🔐</i> Login Admin
        </a>

        <div class="sidebar-footer">
            <button class="theme-toggle" onclick="toggleTheme()">🌓 Ganti Tema Visual</button>
        </div>
    </aside>

    <div id="overlay" class="overlay" onclick="toggleMenu()"></div>

    <!-- MAIN CONTENT AREA -->
    <main class="app-content">
        <!-- DEADLINE SECTION -->
        <section id="deadline-view" class="view active">
            <div class="header-content">
                <h2 class="page-title">DEADLINE TUGAS</h2>
                <div class="tab-modern">
                    <button class="tab-pill active" onclick="filterTab('now', this)">Masa Kini</button>
                    <button class="tab-pill" onclick="filterTab('next', this)">Mendatang</button>
                </div>
            </div>
            <div id="deadline-grid" class="cards-stack"></div>
        </section>

        <!-- STRUCTURE SECTION -->
        <section id="structure-view" class="view">
            <h2 class="page-title">STRUKTUR KELAS</h2>
            <div id="structure-grid" class="cards-stack"></div>
        </section>

        <!-- LOGIN SECTION -->
        <section id="login-page" class="view">
            <div class="login-card glass">
                <h3>Admin Access</h3>
                <div class="input-wrapper">
                    <input type="text" id="username" placeholder="Username">
                    <input type="password" id="password" placeholder="Password">
                </div>
                <button class="btn-primary" onclick="login()">Sign In</button>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
