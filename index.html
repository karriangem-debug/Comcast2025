<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COMCAST 2025 | Premium Portal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body class="light-theme">

    <!-- NAVBAR UTAMA -->
    <nav class="glass-nav">
        <div class="nav-content">
            <button class="menu-trigger" onclick="toggleMenu()" aria-label="Menu">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </button>
            <div class="logo-area">
                <h1 class="logo-comcast animate-glow-fade">COMCAST<span>2025</span></h1>
            </div>
            <div class="nav-spacer"></div>
        </div>
    </nav>

    <!-- SIDEBAR MODERN -->
    <aside id="side-menu" class="modern-sidebar">
        <div class="sidebar-top">
            <span class="badge-admin">USER MODE</span>
        </div>
        
        <div class="menu-group">
            <p class="menu-label">NAVIGASI UTAMA</p>
            <a href="javascript:void(0)" class="menu-item" onclick="showSection('deadline-view')">
                <span class="icon">📅</span> Deadline Tugas
            </a>
            <a href="javascript:void(0)" class="menu-item" onclick="showSection('schedule-view')">
                <span class="icon">📚</span> Jadwal Kuliah
            </a>
            <a href="javascript:void(0)" class="menu-item" onclick="showSection('structure-view')">
                <span class="icon">👥</span> Struktur Kelas
            </a>
        </div>

        <div class="menu-group">
            <p class="menu-label">SINKRONISASI</p>
            <a href="javascript:void(0)" class="menu-item whatsapp-btn" onclick="shareDataToWA()">
                <span class="icon">📲</span> Share Web ke WA
            </a>
        </div>

        <div class="menu-group admin-only" id="admin-menu-area" style="display:none;">
            <p class="menu-label">KONTROL ADMIN</p>
            <a href="javascript:void(0)" class="menu-item" onclick="openAdminPanel()">
                <span class="icon">⚙️</span> Input Data Pro
            </a>
            <a href="javascript:void(0)" class="menu-item logout-link" onclick="logout()">
                <span class="icon">🚪</span> Logout
            </a>
        </div>

        <div class="sidebar-footer">
            <button class="theme-toggle" onclick="toggleTheme()">🌙 Ganti Tema</button>
        </div>
    </aside>

    <div id="menu-overlay" class="overlay" onclick="toggleMenu()"></div>

    <!-- KONTEN UTAMA -->
    <main class="content-wrapper">
        <!-- DEADLINE SECTION -->
        <section id="deadline-view" class="view-section active">
            <div class="header-section">
                <h2 class="title-grad">DEADLINE TUGAS</h2>
                <div class="tabs-modern">
                    <button class="tab-pill active" onclick="filterTab('now', this)">Minggu Ini</button>
                    <button class="tab-pill" onclick="filterTab('next', this)">Mendatang</button>
                    <button class="tab-pill" onclick="filterTab('old', this)">Selesai</button>
                </div>
            </div>
            <div id="deadline-list" class="cards-grid"></div>
        </section>

        <!-- STRUCTURE SECTION -->
        <section id="structure-view" class="view-section">
            <h2 class="title-grad">STRUKTUR KELAS</h2>
            <div id="structure-list" class="cards-grid"></div>
        </section>

        <!-- LOGIN SECTION -->
        <section id="login-section" class="view-section">
            <div class="glass-card login-box">
                <h3>Admin Access</h3>
                <div class="input-group">
                    <input type="text" id="username" placeholder="Username">
                    <input type="password" id="password" placeholder="Password">
                </div>
                <button class="btn-primary" onclick="login()">Masuk ke Sistem</button>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
