<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COMCAST 2025 | Portal Kelas</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body class="light-theme">

    <nav>
        <div class="nav-container">
            <div class="hamburger" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </div>
            <div class="logo-wrapper">
                <!-- Efek Glowing & Animasi Masuk/Keluar 10 Detik -->
                <div class="logo-comcast animate-glow-fade">COMCAST<span>2025</span></div>
            </div>
            <div style="width: 22px;"></div>
        </div>
    </nav>

    <!-- Sidebar Menu -->
    <div id="side-menu" class="side-nav">
        <div class="side-header">TAMPILAN</div>
        <a href="#" onclick="toggleTheme()" id="theme-link">🌙 Dark Mode: Off</a>
        <div class="side-header">MENU UTAMA</div>
        <a href="#" onclick="showSection('deadline-view')">📅 Deadline Tugas</a>
        <a href="#" onclick="showSection('schedule-view')">📚 Jadwal Kuliah</a>
        <div id="admin-only-menu" style="display:none;">
            <div class="side-header admin-tag">ADMIN CONTROL</div>
            <a href="#" onclick="openManageDeadline()">📝 Input Tugas</a>
            <a href="#" onclick="showSection('manage-schedule')">🗓️ Input Jadwal</a>
            <a href="#" onclick="logout()" style="color: #ef4444;">🚪 Logout Admin</a>
        </div>
        <a href="#" id="nav-login" onclick="showSection('login-section')">🔐 Login Admin</a>
    </div>

    <div id="menu-overlay" onclick="toggleMenu()"></div>

    <!-- Main Content -->
    <section id="deadline-view" class="active">
        <div class="header-with-action">
            <h3 class="section-title">DEADLINE TUGAS</h3>
            <!-- Tombol Sinkronisasi Data ke Teman -->
            <button onclick="shareDataToWA()" class="share-group-btn">
                <span>📲</span> Share Ke WA
            </button>
        </div>
        <div class="tab-header">
            <button class="tab-btn active" id="tab-now" onclick="filterDeadline('now')">MINGGU INI</button>
            <button class="tab-btn" id="tab-next" onclick="filterDeadline('next')">MENDATANG</button>
            <button class="tab-btn" id="tab-old" onclick="filterDeadline('old')">SELESAI</button>
        </div>
        <div id="week-display"></div>
    </section>

    <!-- Section Input Admin -->
    <section id="manage-deadline">
        <div class="admin-card">
            <h3 id="form-title">INPUT TUGAS</h3>
            <input type="hidden" id="edit-id">
            <label class="label-admin">MATA KULIAH</label>
            <select id="task-subject-select" onchange="autoFillTime()"></select>
            <label class="label-admin">TANGGAL</label>
            <input type="date" id="task-date">
            <label class="label-admin">JAM</label>
            <input type="time" id="task-time">
            <textarea id="task-name" placeholder="Rincian Tugas..." rows="4"></textarea>
            <button onclick="saveTask()">Simpan & Update Data</button>
        </div>
    </section>

    <!-- Login Section -->
    <section id="login-section">
        <div class="admin-card">
            <h3>LOGIN ADMIN</h3>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button onclick="login()">Masuk</button>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
